<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generate iOS, Android, Expo, and PWA assets from a single icon. 100% client-side." />
    <title>Assets Chef — App Icon & Splash Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:opsz,wght@6..12,400..700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style id="critical-theme">
      :root, [data-theme="light"] { --bg: #F6F3EE; --text: #1C1814; }
      [data-theme="dark"] { --bg: #141210; --text: #F0EBE4; }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) { --bg: #141210; --text: #F0EBE4; }
      }
      body { background-color: var(--bg); color: var(--text); }
      .no-transition, .no-transition * { transition: none !important; }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem('assets-chef-theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (!stored || stored === 'system') {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        }
        document.documentElement.classList.add('no-transition');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
